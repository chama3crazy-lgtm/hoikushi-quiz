<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保育士試験 過去問トレーニング</title>
<style>
:root {
  --primary: #4a90d9;
  --primary-dark: #3a7bc8;
  --correct: #27ae60;
  --wrong: #e74c3c;
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #dde1e6;
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100dvh;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px;
}

/* Header */
header {
  background: var(--primary);
  color: white;
  padding: 16px 0;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
header h1 { font-size: 1.1rem; font-weight: 600; }
header .sub { font-size: 0.8rem; opacity: 0.85; margin-top: 2px; }

/* Screen management */
.screen { display: none; }
.screen.active { display: block; }

/* Card */
.card {
  background: var(--card);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow);
}
.card h2 {
  font-size: 1rem;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--primary);
  color: var(--primary);
}

/* Forms */
select, button {
  font-family: inherit;
  font-size: 1rem;
}
select {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: white;
  color: var(--text);
  margin-bottom: 12px;
  appearance: auto;
}
select:focus { border-color: var(--primary); outline: none; }

.btn {
  display: inline-block;
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  text-align: center;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--primary);
  color: white;
  width: 100%;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled {
  background: #b0c4de;
  cursor: not-allowed;
}
.btn-secondary {
  background: #ecf0f1;
  color: var(--text);
  margin-top: 8px;
  width: 100%;
}
.btn-secondary:hover { background: #dde1e6; }
.btn-small {
  padding: 8px 16px;
  font-size: 0.85rem;
}
.btn-correct { background: var(--correct); color: white; }
.btn-wrong { background: var(--wrong); color: white; }

/* Checkbox & Radio options */
.option-group { margin: 12px 0; }
.option-item {
  display: block;
  padding: 12px 16px;
  margin-bottom: 8px;
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  user-select: none;
  white-space: pre-wrap;
  word-break: break-word;
}
.option-item:hover { border-color: var(--primary); background: #f0f6ff; }
.option-item.selected { border-color: var(--primary); background: #e3eeff; }
.option-item.correct-answer { border-color: var(--correct); background: #e8f8f0; }
.option-item.wrong-answer { border-color: var(--wrong); background: #fde8e8; }
.option-item.disabled { pointer-events: none; }

.option-item input[type="radio"],
.option-item input[type="checkbox"] {
  margin-right: 8px;
  vertical-align: middle;
}

/* Progress bar */
.progress-bar {
  width: 100%;
  height: 6px;
  background: #ecf0f1;
  border-radius: 3px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.3s;
}

/* Question info */
.q-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  color: var(--text-light);
  margin-bottom: 8px;
}
.q-number {
  font-weight: 700;
  font-size: 1rem;
  color: var(--primary);
}

.q-text {
  font-size: 0.95rem;
  margin-bottom: 16px;
  white-space: pre-wrap;
  word-break: break-word;
  line-height: 1.8;
}

/* Result feedback */
.feedback {
  padding: 12px 16px;
  border-radius: 8px;
  margin: 12px 0;
  font-weight: 600;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct { background: #e8f8f0; color: var(--correct); }
.feedback.wrong { background: #fde8e8; color: var(--wrong); }

/* Score display */
.score-display {
  text-align: center;
  padding: 20px;
}
.score-number {
  font-size: 3rem;
  font-weight: 700;
  color: var(--primary);
}
.score-detail { color: var(--text-light); margin-top: 4px; }
.score-bar {
  width: 100%;
  height: 12px;
  background: #ecf0f1;
  border-radius: 6px;
  margin: 16px 0;
  overflow: hidden;
}
.score-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s;
}

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.stat-card {
  background: var(--bg);
  border-radius: 8px;
  padding: 12px;
  text-align: center;
}
.stat-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); }
.stat-label { font-size: 0.75rem; color: var(--text-light); }

/* Filter chips */
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.8rem;
  border: 1px solid var(--border);
  background: white;
  cursor: pointer;
  transition: all 0.2s;
}
.chip.active { background: var(--primary); color: white; border-color: var(--primary); }

/* Mode selection */
.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}
.mode-card {
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-card:hover { border-color: var(--primary); }
.mode-card.selected { border-color: var(--primary); background: #e3eeff; }
.mode-icon { font-size: 2rem; margin-bottom: 4px; }
.mode-name { font-weight: 600; font-size: 0.9rem; }
.mode-desc { font-size: 0.75rem; color: var(--text-light); margin-top: 4px; }

/* Question count badge */
.q-count-badge {
  display: inline-block;
  background: var(--primary);
  color: white;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 0.8rem;
  margin-left: 8px;
}

/* Image warning */
.image-warning {
  background: #fff3cd;
  color: #856404;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 0.8rem;
  margin-bottom: 12px;
}

/* Question images */
.q-images { margin-bottom: 16px; }
.q-images img {
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
  display: block;
}

/* Review list */
.review-item {
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
}
.review-item:last-child { border-bottom: none; }
.review-q { font-weight: 600; margin-bottom: 4px; }
.review-answer { font-size: 0.85rem; }
.review-your { color: var(--wrong); }
.review-correct { color: var(--correct); }

/* Number input */
.num-input-group {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.num-input-group input {
  width: 80px;
  padding: 8px 12px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 1rem;
  text-align: center;
}
.num-input-group input:focus { border-color: var(--primary); outline: none; }

/* Responsive */
@media (max-width: 480px) {
  .container { padding: 12px; }
  .card { padding: 16px; }
  .q-text { font-size: 0.9rem; }
  .option-item { padding: 10px 12px; font-size: 0.9rem; }
  .mode-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>保育士試験 過去問トレーニング</h1>
  <div class="sub">令和3年～令和7年 全1600問</div>
</header>

<!-- ====== 設定画面 ====== -->
<div id="screen-setup" class="screen active">
<div class="container">

  <div class="card">
    <h2>年度を選択</h2>
    <div id="year-chips" class="chip-group"></div>
  </div>

  <div class="card">
    <h2>科目を選択</h2>
    <div id="subject-chips" class="chip-group"></div>
  </div>

  <div class="card">
    <h2>出題モード</h2>
    <div class="mode-grid">
      <div class="mode-card selected" data-mode="sequential">
        <div class="mode-icon">&#128220;</div>
        <div class="mode-name">順番通り</div>
        <div class="mode-desc">問1から順に出題</div>
      </div>
      <div class="mode-card" data-mode="random">
        <div class="mode-icon">&#127922;</div>
        <div class="mode-name">ランダム</div>
        <div class="mode-desc">シャッフルして出題</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>出題数</h2>
    <div class="num-input-group">
      <input type="number" id="q-limit" min="1" value="20">
      <span>問</span>
      <span style="font-size:0.8rem;color:var(--text-light)">（対象: <span id="q-available">0</span>問）</span>
    </div>
    <label style="font-size:0.85rem;display:flex;align-items:center;gap:6px;">
      <input type="checkbox" id="skip-image"> 画像問題をスキップする
    </label>
  </div>

  <button class="btn btn-primary" id="btn-start" disabled>テストを開始する</button>

</div>
</div>

<!-- ====== クイズ画面 ====== -->
<div id="screen-quiz" class="screen">
<div class="container">

  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

  <div class="card">
    <div class="q-info">
      <span class="q-number" id="q-label"></span>
      <span id="q-meta"></span>
    </div>
    <div id="image-warning" class="image-warning" style="display:none;">
      &#9888; この問題は図表を含むため、テキストだけでは解答できない場合があります。
    </div>
    <div class="q-text" id="q-text"></div>
    <div class="q-images" id="q-images"></div>
    <div class="option-group" id="q-options"></div>

    <div class="feedback" id="feedback"></div>

    <button class="btn btn-primary" id="btn-answer">解答する</button>
    <button class="btn btn-primary" id="btn-next" style="display:none;">次の問題へ</button>
  </div>

  <button class="btn btn-secondary btn-small" id="btn-quit">テストを中断する</button>

</div>
</div>

<!-- ====== 結果画面 ====== -->
<div id="screen-result" class="screen">
<div class="container">

  <div class="card">
    <div class="score-display">
      <div class="score-number" id="result-score">0%</div>
      <div class="score-detail" id="result-detail"></div>
      <div class="score-bar"><div class="score-bar-fill" id="score-bar-fill"></div></div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-correct">0</div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-wrong">0</div>
        <div class="stat-label">不正解</div>
      </div>
    </div>
  </div>

  <div class="card" id="review-card" style="display:none;">
    <h2>間違えた問題</h2>
    <div id="review-list"></div>
  </div>

  <button class="btn btn-primary" id="btn-retry">同じ設定でもう一度</button>
  <button class="btn btn-secondary" id="btn-home">設定に戻る</button>

</div>
</div>

<script src="data.js"></script>
<script>
(function() {
  'use strict';

  // --- State ---
  let selectedYears = new Set();
  let selectedSubjects = new Set();
  let quizMode = 'sequential';
  let currentQuiz = [];
  let currentIndex = 0;
  let results = []; // {question, userAnswer, isCorrect}
  let answered = false;

  // --- Data helpers ---
  const years = [...new Set(EXAM_DATA.map(q => q.exam_year))];
  const subjects = [...new Set(EXAM_DATA.map(q => q.subject))];

  function getFilteredQuestions() {
    return EXAM_DATA.filter(q => {
      if (selectedYears.size > 0 && !selectedYears.has(q.exam_year)) return false;
      if (selectedSubjects.size > 0 && !selectedSubjects.has(q.subject)) return false;
      if (document.getElementById('skip-image').checked && q.has_image) return false;
      return true;
    });
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // --- Parse options: separate header row from actual choices ---
  function parseOptions(options) {
    const header = [];
    const choices = [];
    options.forEach(opt => {
      const cleaned = opt.replace(/\t/g, '  ');
      // Header rows don't start with a digit (e.g. "A  B  C  D", "Ａ  Ｂ  Ｃ  Ｄ")
      if (/^\s*\d/.test(cleaned)) {
        choices.push(cleaned);
      } else {
        header.push(cleaned);
      }
    });
    return { header, choices };
  }

  // Check if question requires multiple answers
  function isMultiAnswer(q) {
    if (!q.correct_answer) return false;
    return q.correct_answer.includes(',');
  }

  // Parse correct answer into array of option indices
  function getCorrectIndices(q) {
    if (!q.correct_answer) return [];
    return q.correct_answer.split(',').map(s => s.trim());
  }

  // --- UI: Setup chips ---
  function initChips() {
    const yearContainer = document.getElementById('year-chips');
    years.forEach(y => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = y;
      chip.addEventListener('click', () => {
        chip.classList.toggle('active');
        if (chip.classList.contains('active')) selectedYears.add(y);
        else selectedYears.delete(y);
        updateAvailable();
      });
      yearContainer.appendChild(chip);
    });

    const subContainer = document.getElementById('subject-chips');
    subjects.forEach(s => {
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = s;
      chip.addEventListener('click', () => {
        chip.classList.toggle('active');
        if (chip.classList.contains('active')) selectedSubjects.add(s);
        else selectedSubjects.delete(s);
        updateAvailable();
      });
      subContainer.appendChild(chip);
    });
  }

  function updateAvailable() {
    const count = getFilteredQuestions().length;
    document.getElementById('q-available').textContent = count;
    const limit = document.getElementById('q-limit');
    limit.max = count;
    if (parseInt(limit.value) > count) limit.value = count;
    document.getElementById('btn-start').disabled = count === 0;
  }

  // --- UI: Mode selection ---
  function initModes() {
    document.querySelectorAll('.mode-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        quizMode = card.dataset.mode;
      });
    });
  }

  // --- Quiz logic ---
  function startQuiz() {
    let questions = getFilteredQuestions();
    if (quizMode === 'random') questions = shuffle(questions);

    const limit = parseInt(document.getElementById('q-limit').value) || questions.length;
    currentQuiz = questions.slice(0, limit);
    currentIndex = 0;
    results = [];

    showScreen('screen-quiz');
    showQuestion();
  }

  function showQuestion() {
    if (currentIndex >= currentQuiz.length) {
      showResults();
      return;
    }

    answered = false;
    const q = currentQuiz[currentIndex];
    const multi = isMultiAnswer(q);

    // Progress
    document.getElementById('progress-fill').style.width =
      ((currentIndex / currentQuiz.length) * 100) + '%';

    // Info
    document.getElementById('q-label').textContent =
      `${currentIndex + 1} / ${currentQuiz.length}`;
    document.getElementById('q-meta').textContent =
      `${q.exam_year} ${q.subject} ${q.question_number}`;

    // Image warning (only show if has_image but no image URLs available)
    const hasUrls = q.image_urls && q.image_urls.length > 0;
    document.getElementById('image-warning').style.display =
      (q.has_image && !hasUrls) ? 'block' : 'none';

    // Question text
    document.getElementById('q-text').textContent = q.question_text;

    // Question images
    const imgContainer = document.getElementById('q-images');
    imgContainer.innerHTML = '';
    if (q.image_urls && q.image_urls.length > 0) {
      q.image_urls.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        img.alt = '問題の図表';
        img.loading = 'lazy';
        imgContainer.appendChild(img);
      });
    }

    // Options
    const optContainer = document.getElementById('q-options');
    optContainer.innerHTML = '';

    const { header, choices } = parseOptions(q.options);

    // Show header row as non-selectable label if present
    if (header.length > 0) {
      const headerDiv = document.createElement('div');
      headerDiv.style.cssText = 'padding:8px 16px;font-size:0.85rem;color:var(--text-light);font-weight:600;white-space:pre-wrap;';
      headerDiv.textContent = header.join('\n');
      optContainer.appendChild(headerDiv);
    }

    choices.forEach((opt, i) => {
      const label = document.createElement('label');
      label.className = 'option-item';

      const input = document.createElement('input');
      input.type = multi ? 'checkbox' : 'radio';
      input.name = 'q-option';
      input.value = i;

      label.appendChild(input);
      label.appendChild(document.createTextNode(opt));
      label.addEventListener('click', (e) => {
        if (answered) return;
        if (!multi) {
          optContainer.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
        }
        // Toggle for checkbox
        if (multi && e.target !== input) {
          input.checked = !input.checked;
          e.preventDefault();
        }
        label.classList.toggle('selected', input.checked || (!multi));
      });

      optContainer.appendChild(label);
    });

    // Buttons
    document.getElementById('btn-answer').style.display = 'block';
    document.getElementById('btn-next').style.display = 'none';
    document.getElementById('feedback').classList.remove('show', 'correct', 'wrong');
  }

  function checkAnswer() {
    if (answered) return;

    const q = currentQuiz[currentIndex];
    const multi = isMultiAnswer(q);
    const optContainer = document.getElementById('q-options');
    const inputs = optContainer.querySelectorAll('input');
    const items = optContainer.querySelectorAll('.option-item');

    // Get user selection
    let userSelected = [];
    inputs.forEach((inp, i) => {
      if (inp.checked) userSelected.push(i);
    });

    if (userSelected.length === 0) return; // Nothing selected

    answered = true;

    // Get correct answer indices (match option text starting with the number)
    const correctNums = getCorrectIndices(q);
    const { choices } = parseOptions(q.options);
    const correctIndices = [];
    choices.forEach((opt, i) => {
      const optNum = opt.trim().match(/^(\d+)/);
      if (optNum && correctNums.includes(optNum[1])) {
        correctIndices.push(i);
      }
    });

    // Check correctness
    const isCorrect = correctIndices.length === userSelected.length &&
      correctIndices.every(ci => userSelected.includes(ci));

    // Visual feedback on options
    items.forEach((item, i) => {
      item.classList.add('disabled');
      if (correctIndices.includes(i)) {
        item.classList.add('correct-answer');
      }
      if (userSelected.includes(i) && !correctIndices.includes(i)) {
        item.classList.add('wrong-answer');
      }
    });

    // Feedback text
    const feedback = document.getElementById('feedback');
    feedback.classList.add('show');
    if (isCorrect) {
      feedback.classList.add('correct');
      feedback.textContent = '\u2713 正解!';
    } else {
      feedback.classList.add('wrong');
      feedback.textContent = '\u2717 不正解 - 正解: ' + q.correct_answer;
    }

    // Save result
    results.push({
      question: q,
      userAnswer: userSelected.map(i => choices[i]).join(', '),
      isCorrect
    });

    // Buttons
    document.getElementById('btn-answer').style.display = 'none';
    document.getElementById('btn-next').style.display = 'block';
  }

  function nextQuestion() {
    currentIndex++;
    showQuestion();
  }

  // --- Results ---
  function showResults() {
    showScreen('screen-result');

    const correct = results.filter(r => r.isCorrect).length;
    const total = results.length;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

    document.getElementById('result-score').textContent = pct + '%';
    document.getElementById('result-detail').textContent =
      `${total}問中 ${correct}問正解`;

    document.getElementById('stat-correct').textContent = correct;
    document.getElementById('stat-wrong').textContent = total - correct;

    const barFill = document.getElementById('score-bar-fill');
    barFill.style.width = '0%';
    barFill.style.background = pct >= 60 ? 'var(--correct)' : 'var(--wrong)';
    requestAnimationFrame(() => {
      barFill.style.width = pct + '%';
    });

    // Wrong answers review
    const wrongResults = results.filter(r => !r.isCorrect);
    const reviewCard = document.getElementById('review-card');
    const reviewList = document.getElementById('review-list');
    reviewList.innerHTML = '';

    if (wrongResults.length > 0) {
      reviewCard.style.display = 'block';
      wrongResults.forEach(r => {
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML = `
          <div class="review-q">${r.question.exam_year} ${r.question.subject} ${r.question.question_number}</div>
          <div class="review-answer">
            <div style="font-size:0.85rem;margin-bottom:4px;white-space:pre-wrap;">${escapeHtml(r.question.question_text.substring(0, 100))}...</div>
            <div class="review-correct">\u2713 正解: ${r.question.correct_answer}</div>
          </div>
        `;
        reviewList.appendChild(div);
      });
    } else {
      reviewCard.style.display = 'none';
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // --- Screen management ---
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  }

  // --- Event listeners ---
  document.getElementById('btn-start').addEventListener('click', startQuiz);
  document.getElementById('btn-answer').addEventListener('click', checkAnswer);
  document.getElementById('btn-next').addEventListener('click', nextQuestion);
  document.getElementById('btn-quit').addEventListener('click', () => showResults());
  document.getElementById('btn-retry').addEventListener('click', startQuiz);
  document.getElementById('btn-home').addEventListener('click', () => showScreen('screen-setup'));
  document.getElementById('skip-image').addEventListener('change', updateAvailable);
  document.getElementById('q-limit').addEventListener('input', () => {
    const count = getFilteredQuestions().length;
    const v = parseInt(document.getElementById('q-limit').value);
    if (v > count) document.getElementById('q-limit').value = count;
  });

  // --- Init ---
  initChips();
  initModes();
  updateAvailable();

})();
</script>

</body>
</html>
